<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Factions: Montavera - The Rulebook</title>
    <style>
        :root { --gold: #d4af37; --obsidian: #1a1a1a; --neon: #39ff14; --fire: #ff4500; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: 'Courier New', Courier, monospace; color: white; overflow: hidden; }
        
        /* iPhone Mini Optimization */
        #viewport { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; background-size: cover; background-position: center; transition: 0.5s; }
        #comic-area { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        #ui-box { height: 42%; background: linear-gradient(to top, black 85%, transparent); padding: 15px; display: flex; flex-direction: column; box-sizing: border-box; z-index: 10; }
        
        #dialogue { font-size: 15px; line-height: 1.3; border-left: 3px solid var(--gold); padding-left: 12px; margin-bottom: 10px; min-height: 90px; }
        #choices { display: flex; flex-direction: column; gap: 8px; }
        
        button { background: rgba(255,255,255,0.05); border: 1px solid var(--gold); color: white; padding: 12px; border-radius: 2px; font-size: 13px; text-align: left; text-transform: uppercase; }
        button:active { background: var(--gold); color: black; }

        /* Snapshot Flash Effect */
        .flash-white { animation: flashW 0.8s forwards; }
        @keyframes flashW { 0% { background: white; } 100% { background: transparent; } }

        /* Handshake Overlay */
        #handshake { position: fixed; inset: 0; background: var(--obsidian); z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .sigil { width: 80px; height: 80px; border: 2px solid var(--gold); border-radius: 50%; color: var(--gold); font-size: 40px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px var(--gold); margin-bottom: 20px; cursor: pointer; }
        
        /* Mobile Text Bubble Animation */
        .phone-notif { position: absolute; top: 20px; right: 10px; left: 10px; background: rgba(255,255,255,0.9); color: black; padding: 10px; border-radius: 10px; font-family: sans-serif; font-size: 12px; display: none; animation: slideIn 0.3s forwards; }
        @keyframes slideIn { from { transform: translateY(-100px); } to { transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="handshake" onclick="startEngine()">
        <div class="sigil">M</div>
        <p style="letter-spacing: 2px; font-size: 10px;">TAP TO UNLOCK THE SHRINE</p>
    </div>

    <div id="viewport" style="display:none;">
        <div id="comic-area">
            <div id="phone-bubble" class="phone-notif">
                <strong>MOM:</strong> When are you coming home for dinner? Don't be late.
            </div>
        </div>
        <div id="ui-box">
            <div id="dialogue">
                <strong id="speaker" style="color:var(--gold)">???</strong><br>
                <span id="speech">...</span>
            </div>
            <div id="choices"></div>
        </div>
    </div>

    <audio id="shrine-theme" loop src="shrine_theme.mp3"></audio>
    <audio id="sfx-click" src="click.mp3"></audio>
    <audio id="sfx-trap" src="trap_trigger.mp3"></audio>

    <script>
        let node = "start";
        const ui = {
            viewport: document.getElementById('viewport'),
            speaker: document.getElementById('speaker'),
            speech: document.getElementById('speech'),
            choices: document.getElementById('choices'),
            phone: document.getElementById('phone-bubble'),
            sfxTrap: document.getElementById('sfx-trap')
        };

        const story = {
            "start": {
                img: "1_invitation.png", speaker: "NARRATOR",
                text: "The seal breaks. You are ushered into a room of ticking card-clocks and trophy-dust.",
                btns: [{ text: "Enter the Office", next: "meet_headmaster" }]
            },
            "meet_headmaster": {
                img: "7_headmaster.png", speaker: "HEADMASTER",
                text: "Citizen. You hold the Asimov deck. A pathetic choice. Let us see if you can even read your own cards.",
                btns: [{ text: "Draw Hand", next: "tutorial_draw" }]
            },
            "tutorial_draw": {
                img: "13_hand.png", speaker: "HEADMASTER",
                text: "The first rule of Montavera: One action. No more. Play Asimov 200.",
                btns: [{ text: "Play Asimov 200", next: "flash_forward_1" }]
            },
            "flash_forward_1": {
                img: "snapshot_a.png", speaker: "NARRATOR",
                text: "...3 ROUNDS LATER... \n\n The board has turned. The Headmaster leads with Master Nero. Your Plot Twists are useless.",
                btns: [{ text: "Assess the damage", next: "phone_trigger" }]
            },
            "phone_trigger": {
                img: "snapshot_a.png", speaker: "SYSTEM",
                text: "*Vibrates* Your phone buzzed. It's your Mom.",
                btns: [{ text: "Ignore it", next: "phone_response" }, { text: "Reply Saucily", next: "phone_response" }]
            },
            "phone_response": {
                img: "getoffyourphone.png", speaker: "BOY",
                text: "'Who are you, lady? My mom doesn't believe in dinner. She thinks its a government conspiracy.'",
                btns: [{ text: "Send Message", next: "headmaster_trap" }]
            },
            "headmaster_trap": {
                img: "getoffyourphone.png", speaker: "HEADMASTER",
                text: "GOTCHA. Triggering PLOT TWIST: GET OFF YOUR PHONE. That's 16 words, Citizen. Destroy 16 cards. Now.",
                btns: [{ text: "Lose everything", next: "flash_final" }]
            },
            "flash_final": {
                img: "snapshot_final.png", speaker: "NARRATOR",
                text: "...5 ROUNDS LATER... \n\n You are down to your last breath. The Headmaster's Lilit Sisters are laughing. But look at your hand.",
                btns: [{ text: "See ASIMOV and ANTHONY", next: "infinite_agony" }]
            },
            "infinite_agony": {
                img: "death_combo.png", speaker: "HEADMASTER",
                text: "Why are you smiling? You have a boy with chickens and a rusted robot. I have gods.",
                btns: [
                    { text: "Place Anthony next to Asimov", next: "victory" },
                    { text: "Cry", next: "victory" }
                ]
            },
            "victory": {
                img: "47_handshake.png", speaker: "HEADMASTER",
                text: "Wait... the roll is locked at 1? The loop... it won't stop! My Bosses... they're melting!",
                btns: [{ text: "Accept Handshake", next: "end" }]
            },
            "end": {
                img: "50_final.png", speaker: "NARRATOR",
                text: "You've survived the Rulebook. Montavera is yours to conquer.",
                btns: [{ text: "PLAY AGAIN", next: "start" }]
            }
        };

        function startEngine() {
            document.getElementById('handshake').style.display = 'none';
            ui.viewport.style.display = 'flex';
            document.getElementById('shrine-theme').play();
            renderNode("start");
        }

        function renderNode(id) {
            const data = story[id];
            ui.viewport.style.backgroundImage = `url('${data.img}')`;
            ui.speaker.innerText = data.speaker;
            ui.speech.innerText = data.text;
            ui.choices.innerHTML = "";

            if(id === "phone_trigger") ui.phone.style.display = "block";
            else ui.phone.style.display = "none";

            if(id.includes("flash")) {
                ui.viewport.classList.add('flash-white');
                setTimeout(() => ui.viewport.classList.remove('flash-white'), 800);
            }

            data.btns.forEach(b => {
                const btn = document.createElement('button');
                btn.innerText = b.text;
                btn.onclick = () => renderNode(b.next);
                ui.choices.appendChild(btn);
            });
        }
    </script>
</body>
</html>
